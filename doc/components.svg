  <path d="M145,252 L145,270 L145,270" class="arrow" stroke="#888"></path>

  
  <rect x="20" y="330" width="370" height="70" fill="#e8e8ec" stroke="#bbb" class="box" stroke-dasharray="4,3"></rect>
  <text x="36" y="355" font-size="14" font-weight="600" fill="#444">JavaFX Runtime</text>
  <text x="36" y="374" class="desc">Application, Stage, FXMLLoader, Platform</text>

  <rect x="410" y="330" width="390" height="70" fill="#e8e8ec" stroke="#bbb" class="box" stroke-dasharray="4,3"></rect>
  <text x="426" y="355" font-size="14" font-weight="600" fill="#444">Jakarta CDI SE Container</text>
  <text x="426" y="374" class="desc">BeanManager, Events, Scopes, Extensions</text>

  
  <path d="M145,252 L145,326" class="arrow" stroke="#888"></path>
  <path d="M415,308 L415,326" class="arrow" stroke="#888"></path>
  <path d="M680,308 L680,326" class="arrow" stroke="#888"></path>
